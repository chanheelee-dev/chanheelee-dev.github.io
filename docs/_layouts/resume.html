<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    :root {
      --color-bg:       #ffffff;
      --color-text:     #1a1a1a;
      --color-muted:    #555555;
      --color-accent:   #2563eb;
      --color-border:   #e2e8f0;
      --color-tag-bg:   #eff6ff;
      --color-tag-text: #1e40af;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR',
                   -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: var(--color-text);
      background: var(--color-bg);
      margin: 0;
      padding: 0;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    a {
      color: var(--color-accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }

    /* ── Container ── */
    .resume-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    /* ── Header ── */
    .resume-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 16px;
      border-bottom: 2px solid var(--color-accent);
      padding-bottom: 24px;
      margin-bottom: 8px;
    }

    .resume-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 4px;
      line-height: 1.2;
    }

    .name-en {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--color-muted);
      letter-spacing: 0;
    }

    .header-title {
      font-size: 0.95rem;
      color: var(--color-muted);
      margin: 0;
    }

    .header-right {
      text-align: right;
      font-size: 0.82rem;
      color: var(--color-muted);
      line-height: 1.9;
    }

    .header-right a { color: var(--color-muted); }
    .header-right a:hover { color: var(--color-accent); }

    /* ── PDF Button ── */
    .pdf-btn-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .pdf-btn-row button {
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
    }

    .pdf-btn-row button:hover { background: #1d4ed8; }

    /* ── Section titles ── */
    .resume-section { margin-bottom: 8px; }

    .resume-section h2 {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-accent);
      border-left: 3px solid var(--color-accent);
      padding-left: 10px;
      margin: 32px 0 16px;
    }

    /* ── Summary ── */
    .summary-text {
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    /* ── Experience / Education entries ── */
    .exp-entry {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 0 24px;
      margin-bottom: 24px;
    }

    .exp-date {
      font-size: 0.78rem;
      color: var(--color-muted);
      padding-top: 3px;
      text-align: right;
      line-height: 1.5;
    }

    .exp-content h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0 0 2px;
    }

    .exp-role {
      font-size: 0.82rem;
      color: var(--color-muted);
      font-style: italic;
      margin: 0 0 8px;
    }

    .exp-content ul {
      margin: 0;
      padding-left: 18px;
    }

    .exp-content li {
      font-size: 0.88rem;
      margin-bottom: 4px;
    }

    /* ── Skills ── */
    .skills-list { display: flex; flex-direction: column; gap: 10px; }

    .skill-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .skill-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--color-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      min-width: 150px;
      padding-top: 3px;
      flex-shrink: 0;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .skill-tag {
      background: var(--color-tag-bg);
      color: var(--color-tag-text);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    /* ── Projects ── */
    .project-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .project-item {
      margin-bottom: 14px;
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 2px;
    }

    .project-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-text);
    }

    a.project-title { color: var(--color-accent); }

    .project-period {
      font-size: 0.78rem;
      color: var(--color-muted);
      white-space: nowrap;
    }

    .project-summary {
      font-size: 0.84rem;
      color: var(--color-muted);
      margin: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .resume-container { padding: 24px 20px; }

      .resume-header {
        grid-template-columns: 1fr;
      }

      .header-right { text-align: left; }

      .exp-entry {
        grid-template-columns: 1fr;
      }

      .exp-date {
        text-align: left;
        margin-bottom: 4px;
      }

      .skill-group {
        flex-direction: column;
        gap: 6px;
      }

      .skill-label { min-width: unset; }

      .project-header { flex-wrap: wrap; }
    }

    /* ── Print / PDF ── */
    @media print {
      @page {
        size: A4;
        margin: 18mm;
      }

      body { font-size: 11pt; }

      .resume-container {
        max-width: 100%;
        padding: 0;
      }

      .no-print { display: none !important; }

      .exp-entry { page-break-inside: avoid; }
      h2 { page-break-after: avoid; }
      h3 { page-break-after: avoid; }
      .project-item { page-break-inside: avoid; }

      .skill-tag {
        background: transparent !important;
        border: 1px solid #999;
        color: #333;
      }

      a { color: #1a1a1a; text-decoration: underline; }
      a.project-title { color: #1a1a1a; }
    }
  </style>
</head>
<body>
  <div class="resume-container">
    {% for section in page.sections %}
      {% include resume/{{ section }}.html target_tags=page.target_tags summary_key=page.summary_key %}
    {% endfor %}
  </div>
</body>
</html>
