theme: jekyll-theme-primer
title: Chanhee's Dev Blog
url: "https://chanheelee-dev.github.io"
baseurl: ""
repository: chanheelee-dev/chanheelee-dev.github.io

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "content/essays"
    values:
      permalink: /essays/:basename
  - scope:
      path: "content/projects"
    values:
      permalink: /projects/:basename
  - scope:
      path: "content/index.md"
    values:
      permalink: /
  - scope:
      path: "apps"
    values:
      layout: null

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-optional-front-matter
  - jekyll-relative-links

kramdown:
  math_engine: mathjax

exclude:
  - README.md
  - DEV.md
  - netlify.toml
  - docs/
  - .worktrees/
  - Gemfile
  - Gemfile.lock
  - code/
